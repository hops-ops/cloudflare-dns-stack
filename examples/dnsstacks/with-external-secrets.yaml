apiVersion: cloudflare.hops.ops.com.ai/v1alpha1
kind: DNSStack
metadata:
  name: dns
  namespace: default
spec:
  clusterName: my-cluster
  domains:
  - name: example.com
  clusterIssuer:
    email: admin@example.com
  # Pull the Cloudflare API token from AWS Secrets Manager via the
  # platform-wide hops-aws-secrets-manager ClusterSecretStore (composed by
  # aws-secret-stack). One ExternalSecret per consumer namespace
  # (external-dns + cert-manager).
  externalSecrets:
    enabled: true
    remoteRef:
      key: prod/cloudflare/api-token
      property: token
    # secretStoreRef defaults to hops-aws-secrets-manager / ClusterSecretStore;
    # override only when integrating with a different backend.
    # refreshInterval defaults to 1h.
