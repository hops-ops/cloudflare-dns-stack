apiVersion: cloudflare.hops.ops.com.ai/v1alpha1
kind: DNSStack
metadata:
  name: dns
  namespace: default
spec:
  clusterName: prod-cluster
  domains:
  - name: example.com
  - name: internal.example.com
  apiToken:
    secretName: cloudflare-api-token
    secretKey: api-token
  externalDNS:
    enabled: true
    # Toggle on to publish DNS for Gateway API HTTPRoutes
    # (e.g. Knative-on-net-gateway-api routes, Istio Ambient routes).
    gatewayApi:
      enabled: true
  certManager:
    enabled: true
    name: cert-manager
    namespace: cert-manager
  clusterIssuer:
    enabled: true
    email: platform@example.com
    staging: false
  # Compose wildcard Certificates per zone so the platform Gateway can
  # terminate TLS for *.<zone> without per-app cert plumbing. Secrets land
  # in istio-ingress (where the platform Gateway lives) by default.
  wildcardCertificate:
    enabled: true
    domains:
    - domain: example.com
    - domain: internal.example.com
  # Pulls the Cloudflare API token from AWS Secrets Manager via the
  # platform-wide hops-aws-secrets-manager ClusterSecretStore.
  externalSecrets:
    enabled: true
    remoteRef:
      key: prod/cloudflare/api-token
      property: token
